name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes (GitHub minimum)
  workflow_dispatch: {}     # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "X-Ping-Source: github-actions" \
            "${{ secrets.DASHBOARD_URL }}/api/ping")
          echo "Response: $STATUS"
          if [ "$STATUS" = "503" ] || [ "$STATUS" = "000" ]; then
            echo "Cold start detected — retrying in 35s..."
            sleep 35
            STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -H "X-Ping-Source: github-actions-retry" \
              "${{ secrets.DASHBOARD_URL }}/api/ping")
            echo "Retry response: $STATUS2"
          fi

  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45  # days before auto-commit to prevent 60-day disable
