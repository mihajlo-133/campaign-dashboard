<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Email QA{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-el: #ffffff;
      --bg-hov: #f0f0f2;
      --bd: #e0e0e4;
      --bd-s: #d0d0d4;
      --tx1: #1a1a1a;
      --tx2: #6b6b6b;
      --tx3: #8a8a8e;
      --blue: #2756f7;
      --blue-h: #1679fa;
      --green: #1a8a3e;
      --amber: #b87a00;
      --red: #c33939;
      --sh: 0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
      --sh-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: var(--tx1);
      background: var(--bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Topbar / Nav */
    .topbar {
      height: 64px;
      background: var(--bg-el);
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-size: 18px;
      font-weight: 600;
      color: var(--tx1);
      text-decoration: none;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Gear icon button */
    .gear-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--bd);
      background: var(--bg-el);
      cursor: pointer;
      text-decoration: none;
      color: var(--tx2);
      transition: background 0.15s, border-color 0.15s;
      padding: 4px;
    }

    .gear-btn:hover {
      background: var(--bg-hov);
      border-color: var(--bd-s);
    }

    .gear-btn:hover svg {
      color: var(--tx1);
    }

    .gear-btn svg {
      width: 18px;
      height: 18px;
      color: var(--tx2);
      flex-shrink: 0;
    }

    /* Page content */
    .page-content {
      min-height: calc(100vh - 64px);
    }

    /* Toast container */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 320px;
      pointer-events: auto;
      animation: toast-in 0.2s ease;
    }

    .toast-success {
      background: rgba(52, 199, 89, 0.15);
      color: #1a8a3e;
      border: 1px solid rgba(52, 199, 89, 0.25);
    }

    .toast-error {
      background: rgba(195, 57, 57, 0.12);
      color: var(--red);
      border: 1px solid rgba(195, 57, 57, 0.2);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-brand">Email QA</a>
    <div class="topbar-actions">
      <a href="/admin" class="gear-btn" aria-label="Admin settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </a>
    </div>
  </nav>

  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <div id="toast-container"></div>

  <script>
    function showToast(message, type) {
      type = type || 'success';
      var container = document.getElementById('toast-container');
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.2s';
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 200);
      }, 3000);
    }
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
